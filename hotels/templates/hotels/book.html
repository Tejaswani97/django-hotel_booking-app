<!DOCTYPE html>
<html>
<head>
    <title>Book Hotel</title>
</head>
<body style="font-family: Arial; background: #f5f5f5;">

<div style="width: 400px; margin: 50px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">

    <h2 style="text-align: center;">Book {{ hotel.name }}</h2>

    <!-- Hotel Image -->
    <div style="text-align: center;">
        <img src="{% if hotel.image %}{{ hotel.image.url }}{% endif %}" 
             style="width: 100%; height: 200px; object-fit: cover; border-radius: 10px;">
    </div>

    <p><strong>Address:</strong> {{ hotel.address }}</p>
    <p><strong>Price per night:</strong> ₹{{ hotel.price_per_night }}</p>

    <form method="POST" onsubmit="return validateForm()">
        {% csrf_token %}

        <label>Check-in Date:</label><br>
        <input type="date" id="check_in" name="check_in" required 
        style="width: 100%; padding: 8px; margin-bottom: 10px;" onchange="calculatePrice()"><br>

        <label>Check-out Date:</label><br>
        <input type="date" id="check_out" name="check_out" required 
        style="width: 100%; padding: 8px; margin-bottom: 10px;" onchange="calculatePrice()"><br>

        <label>Number of Rooms:</label><br>
        <input type="number" id="rooms" name="rooms" min="1" required 
        style="width: 100%; padding: 8px; margin-bottom: 15px;" onchange="calculatePrice()"><br>

        <!-- TOTAL PRICE -->
        <p id="totalPrice" style="font-weight: bold; color: green;"></p>

        <button type="submit" 
        style="width: 100%; padding: 10px; background: green; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Confirm Booking
        </button>
    </form>

    <br>

    <div style="text-align: center;">
        <a href="/home/" style="text-decoration: none; color: #333;">⬅ Back to Home</a>
    </div>

</div>

<script>
function calculatePrice() {
    let checkIn = new Date(document.getElementById("check_in").value);
    let checkOut = new Date(document.getElementById("check_out").value);
    let rooms = document.getElementById("rooms").value;

    if (checkIn && checkOut && rooms) {
        let days = (checkOut - checkIn) / (1000 * 60 * 60 * 24);

        if (days > 0) {
            let pricePerNight = {{ hotel.price_per_night }};
            let total = pricePerNight * rooms * days;
            document.getElementById("totalPrice").innerText = "Total Price: ₹" + total;
        }
    }
}

function validateForm() {
    let checkIn = new Date(document.getElementById("check_in").value);
    let checkOut = new Date(document.getElementById("check_out").value);

    if (checkOut <= checkIn) {
        alert("Check-out date must be after check-in date!");
        return false;
    }
    return true;
}
</script>

</body>
</html>
