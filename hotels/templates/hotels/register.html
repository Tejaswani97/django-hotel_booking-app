<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .register-container{
            width:400px;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        form p{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#444;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:14px;
            transition:0.3s;
        }

        input:focus{
            border-color:#4facfe;
            outline:none;
            box-shadow:0 0 5px rgba(79,172,254,0.4);
        }

        .helptext{
            display:block;
            margin-top:6px;
            font-size:12px;
            color:#777;
            line-height:1.5;
        }

        ul{
            margin-top:8px;
            margin-left:18px;
            color:#777;
            font-size:12px;
        }

        button{
            width:100%;
            padding:12px;
            background:#4facfe;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        button:hover{
            background:#2196f3;
        }

        .login-link{
            text-align:center;
            margin-top:20px;
            font-size:14px;
        }

        .login-link a{
            color:#2196f3;
            text-decoration:none;
            font-weight:bold;
        }

        .login-link a:hover{
            text-decoration:underline;
        }

    </style>
</head>

<body>

<div class="register-container">

    <h2>Create Account</h2>
    
    <form method="POST">
    {% csrf_token %}

    {% for field in form %}

        <div style="margin-bottom:18px;">

            <label style="display:block; margin-bottom:8px; font-weight:bold;">
                {{ field.label }}
            </label>

            {{ field }}

            {% if field.help_text %}
                <small style="color:gray; display:block; margin-top:5px;">
                    {{ field.help_text }}
                </small>
            {% endif %}

            {% for error in field.errors %}
                <p style="color:red; margin-top:5px;">
                    {{ error }}
                </p>
            {% endfor %}

        </div>

    {% endfor %}

    <button type="submit">
        Register
    </button>
</form>

    <div class="login-link">
        Already have an account?
        <a href="{% url 'login' %}">
            Login
        </a>
    </div>

</div>

</body>
</html>
