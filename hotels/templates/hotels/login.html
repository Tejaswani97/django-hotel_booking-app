<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body style="font-family: Arial; background:#f5f5f5;">

<div style="width:350px; margin:80px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);">

    <h2 style="text-align:center;">Login</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required
        style="width:100%; padding:10px; margin-bottom:10px;"><br>

        <input type="password" name="password" placeholder="Password" required
        style="width:100%; padding:10px; margin-bottom:15px;"><br>

        <button type="submit"
        style="width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:5px;">
            Login
        </button>
    </form>

</div>

</body>
</html>
